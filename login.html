<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/images/hemmeq_logo_transparent.png" />
  <link rel="apple-touch-icon" href="assets/images/hemmeq_favicon.png" />
  <title>HEMMEQ | Login</title>
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body class="page-login">
  <div class="page">
    <img class="logo" src="assets/images/logo.jpg" alt="HEMMEQ Logo" />
    <div class="brand-name">HEMMEQ</div>
    <h1>Geschuetzter Bereich</h1>
    <p>Bitte Passwort eingeben, um die Inhalte zu oeffnen.</p>

    <form id="loginForm">
      <label for="password">Passwort</label>
      <input id="password" type="password" inputmode="numeric" autocomplete="off" required />
      <button type="submit">Freischalten</button>
      <div class="error" id="error"></div>
    </form>
  </div>

  <script src="assets/js/login.js"></script>
</body>
</html>
