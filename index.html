<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEMMEQ</title>
  <style>
    :root {
      --gold: #b8912d;
      --deep-gold: #6f5418;
      --black: #050505;
      --charcoal: #11100d;
      --ivory: #f3ead8;
      --muted: #8d8474;
      --line: rgba(184, 145, 45, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 16%, rgba(184,145,45,0.20) 0%, rgba(184,145,45,0.05) 30%, transparent 58%),
        radial-gradient(circle at 13% 82%, rgba(184,145,45,0.08) 0%, transparent 34%),
        linear-gradient(160deg, #030303 0%, #11100d 50%, #030303 100%);
      color: var(--ivory);
      overflow-x: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, transparent 48%, rgba(0,0,0,0.68) 100%);
      z-index: 0;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 36px clamp(24px, 5vw, 76px);
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      font-weight: 700;
      letter-spacing: 0.26em;
      font-size: 14px;
      color: rgba(243,234,216,0.92);
    }

    .brand img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 24px rgba(184,145,45,0.28));
    }

    .contact-top {
      color: rgba(243,234,216,0.62);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid rgba(184,145,45,0.32);
      padding-bottom: 5px;
      transition: color 180ms ease, border-color 180ms ease;
    }

    .contact-top:hover {
      color: var(--ivory);
      border-color: var(--gold);
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 70px 0 82px;
    }

    .hero {
      width: min(980px, 100%);
    }

    .emblem {
      width: 138px;
      height: 138px;
      margin: 0 auto 42px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(184,145,45,0.18), rgba(184,145,45,0.035) 64%, transparent 72%);
      border: 1px solid var(--line);
      box-shadow:
        0 0 110px rgba(184,145,45,0.16),
        inset 0 0 42px rgba(184,145,45,0.045);
    }

    .emblem img {
      width: 80px;
      height: auto;
      object-fit: contain;
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 32px rgba(184,145,45,0.38));
    }

    .eyebrow {
      color: var(--gold);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(62px, 12vw, 156px);
      line-height: 0.84;
      letter-spacing: -0.078em;
      margin-bottom: 34px;
      font-weight: 500;
      text-shadow: 0 28px 70px rgba(0,0,0,0.48);
    }

    .subline {
      max-width: 750px;
      margin: 0 auto;
      color: #c9bfae;
      font-size: clamp(18px, 2.05vw, 25px);
      line-height: 1.58;
    }

    .divider {
      width: 1px;
      height: 96px;
      background: linear-gradient(transparent, rgba(184,145,45,0.72), transparent);
      margin: 46px auto 38px;
    }

    .credo {
      max-width: 690px;
      margin: 0 auto;
      color: rgba(243,234,216,0.68);
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(20px, 2.4vw, 31px);
      line-height: 1.35;
      letter-spacing: -0.025em;
    }

    .statement {
      margin-top: 34px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      color: rgba(141,132,116,0.9);
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      border-top: 1px solid rgba(184,145,45,0.10);
      padding-top: 22px;
    }

    footer a {
      color: rgba(243,234,216,0.58);
      text-decoration: none;
      transition: color 180ms ease;
    }

    footer a:hover {
      color: var(--ivory);
    }

    @media (max-width: 720px) {
      .page {
        padding: 28px 22px;
      }

      .brand {
        letter-spacing: 0.2em;
      }

      .emblem {
        width: 116px;
        height: 116px;
        margin-bottom: 34px;
      }

      .emblem img {
        width: 68px;
      }

      footer {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="vignette"></div>

  <div class="page">
    <header>
      <div class="brand">
        <!-- Logo-Datei in denselben Ordner legen und als logo.jpg / logo.png benennen -->
        <img src="logo.jpg" alt="HEMMEQ Logo" />
        <span>HEMMEQ</span>
      </div>
      <a class="contact-top" href="mailto:hello@hemmeq.com">Kontakt aufnehmen</a>
    </header>

    <main>
      <section class="hero">
        <div class="emblem">
          <img src="logo.jpg" alt="Goldene Fackel als HEMMEQ Logo" />
        </div>

        <div class="eyebrow">Private holding company</div>
        <h1>HEMMEQ</h1>
        <p class="subline">
          Built to create, acquire and compound companies beyond the horizon of a single lifetime.
        </p>

        <div class="divider"></div>

        <p class="credo">
          Not built for exits. Built for permanence.
        </p>

        <div class="statement">Creation · Acquisition · Legacy</div>
      </section>
    </main>

    <footer>
      <span>© 2025 HEMMEQ</span>
      <a href="https://hemmeq.com">hemmeq.com</a>
    </footer>
  </div>
</body>
</html>
